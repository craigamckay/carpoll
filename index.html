<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Car Poll</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e0e0e;
      --surface:   #181818;
      --surface2:  #222222;
      --border:    rgba(255,255,255,0.08);
      --border2:   rgba(255,255,255,0.16);
      --text:      #f0ede6;
      --muted:     #888;
      --accent:    #e8d06a;
      --accent-bg: rgba(232,208,106,0.10);
      --green:     #4ecb8d;
      --green-bg:  rgba(78,203,141,0.10);
      --radius:    10px;
      --radius-lg: 16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', serif;
      min-height: 100vh;
      padding: 0 16px 60px;
    }

    header {
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 0 32px;
      border-bottom: 0.5px solid var(--border);
      margin-bottom: 32px;
    }

    header h1 {
      font-size: clamp(28px, 6vw, 44px);
      font-weight: normal;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1.1;
    }

    header h1 span { color: var(--accent); }

    header p {
      margin-top: 8px;
      font-size: 15px;
      color: var(--muted);
      font-family: 'Courier New', monospace;
    }

    .container { max-width: 640px; margin: 0 auto; }

    /* ── ADD FORM ── */
    .add-form {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 32px;
    }

    .add-form label {
      display: block;
      font-size: 11px;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .input-row input {
      flex: 1;
      min-width: 140px;
      background: var(--surface2);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      font-family: 'Georgia', serif;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .input-row input:focus { border-color: var(--accent); }
    .input-row input::placeholder { color: var(--muted); }

    .btn-add {
      background: var(--accent);
      color: #111;
      border: none;
      border-radius: var(--radius);
      padding: 10px 20px;
      font-size: 14px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 0.04em;
      white-space: nowrap;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-add:hover { opacity: 0.88; }
    .btn-add:active { transform: scale(0.97); }
    .btn-add:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── STATS ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }

    .stat {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }

    .stat .val { font-size: 26px; font-weight: normal; color: var(--text); line-height: 1; }
    .stat .lbl { font-size: 11px; font-family: 'Courier New', monospace; color: var(--muted); margin-top: 4px; letter-spacing: 0.06em; text-transform: uppercase; }

    /* ── LIST ── */
    .section-label {
      font-size: 11px;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .cars-list { display: flex; flex-direction: column; gap: 8px; }

    .car-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.2s;
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .car-card.voted { border-color: rgba(78,203,141,0.4); }

    .rank { font-size: 12px; font-family: 'Courier New', monospace; color: var(--muted); min-width: 22px; text-align: center; flex-shrink: 0; }
    .rank.top { font-size: 18px; }

    .vote-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: var(--surface2);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      padding: 8px 12px;
      cursor: pointer;
      color: var(--muted);
      min-width: 50px;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .vote-btn:hover { border-color: var(--green); color: var(--green); }
    .vote-btn.active { background: var(--green-bg); border-color: var(--green); color: var(--green); }
    .vote-btn .count { font-size: 20px; font-weight: normal; line-height: 1; }
    .vote-btn .lbl { font-size: 10px; font-family: 'Courier New', monospace; letter-spacing: 0.06em; text-transform: uppercase; }

    .car-info { flex: 1; min-width: 0; cursor: pointer; }
    .car-info:hover .car-name { color: var(--accent); }

    .car-name { font-size: 16px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.15s; }

    .car-meta { font-size: 12px; font-family: 'Courier New', monospace; color: var(--muted); margin-top: 4px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    .car-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 11px;
      font-family: 'Courier New', monospace;
      opacity: 0.8;
      transition: opacity 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
      display: inline-block;
    }
    .car-link:hover { opacity: 1; }

    .edit-hint {
      font-size: 10px;
      font-family: 'Courier New', monospace;
      color: var(--muted);
      opacity: 0;
      transition: opacity 0.15s;
      letter-spacing: 0.04em;
    }
    .car-info:hover .edit-hint { opacity: 1; }

    .bar-wrap { margin-top: 7px; height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
    .bar { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.4s ease; }

    /* ── MODAL OVERLAY ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-lg);
      padding: 24px;
      width: 100%;
      max-width: 440px;
      transform: translateY(8px);
      transition: transform 0.2s;
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal h2 {
      font-size: 14px;
      font-weight: normal;
      font-family: 'Courier New', monospace;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .modal-field { margin-bottom: 14px; }

    .modal-field label {
      display: block;
      font-size: 11px;
      font-family: 'Courier New', monospace;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .modal-field input {
      width: 100%;
      background: var(--surface2);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      font-family: 'Georgia', serif;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .modal-field input:focus { border-color: var(--accent); }
    .modal-field input::placeholder { color: var(--muted); }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 20px;
      justify-content: flex-end;
    }

    .btn-cancel {
      background: transparent;
      color: var(--muted);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      padding: 9px 18px;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-cancel:hover { color: var(--text); border-color: var(--border); }

    .btn-save {
      background: var(--accent);
      color: #111;
      border: none;
      border-radius: var(--radius);
      padding: 9px 22px;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.15s;
    }
    .btn-save:hover { opacity: 0.88; }
    .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── EMPTY / TOAST ── */
    .empty { text-align: center; padding: 48px 0; color: var(--muted); font-family: 'Courier New', monospace; font-size: 13px; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--surface);
      border: 0.5px solid var(--border2);
      color: var(--text);
      padding: 10px 20px;
      border-radius: var(--radius);
      font-size: 13px;
      font-family: 'Courier New', monospace;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .setup-banner {
      background: rgba(232,208,106,0.08);
      border: 1px solid rgba(232,208,106,0.3);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      margin-bottom: 28px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.7;
      color: var(--accent);
    }

    @media (max-width: 480px) {
      .stat .val { font-size: 20px; }
    }
  </style>
</head>
<body>

<header>
  <h1>The <span>Car</span> Poll</h1>
  <p>add yours · vote · settle it.</p>
</header>

<div class="container">

  <div class="setup-banner" id="setupBanner" style="display:none;">
    ⚠ Supabase not configured — edit SUPABASE_URL and SUPABASE_KEY in the script, then redeploy.
  </div>

  <div class="add-form">
    <label>Nominate a car</label>
    <div class="input-row">
      <input id="carInput"  type="text" placeholder="e.g. Porsche 911 GT3" autocomplete="off" />
      <input id="nameInput" type="text" placeholder="Your name" style="max-width:150px;" autocomplete="off" />
      <input id="linkInput" type="url"  placeholder="Link (optional)" style="max-width:180px;" autocomplete="off" />
      <button class="btn-add" id="addBtn" onclick="addCar()">Add</button>
    </div>
  </div>

  <div class="stats" id="statsRow" style="display:none;">
    <div class="stat"><div class="val" id="statCars">0</div><div class="lbl">Cars</div></div>
    <div class="stat"><div class="val" id="statVotes">0</div><div class="lbl">Votes</div></div>
    <div class="stat"><div class="val" id="statMine">0</div><div class="lbl">Yours</div></div>
  </div>

  <div class="section-label" id="listLabel" style="display:none;">Leaderboard</div>
  <div class="cars-list" id="carsList"></div>
  <div class="empty" id="emptyState">No cars yet — nominate the first one above.</div>

</div>

<!-- Edit modal -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2>Edit entry</h2>
    <div class="modal-field">
      <label>Car name</label>
      <input id="editName" type="text" placeholder="e.g. Porsche 911 GT3" autocomplete="off" />
    </div>
    <div class="modal-field">
      <label>Web link</label>
      <input id="editLink" type="url" placeholder="https://..." autocomplete="off" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="saveBtn" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ─────────────────────────────────────────────
  //  Paste your Supabase credentials here
  // ─────────────────────────────────────────────
  const SUPABASE_URL = 'https://dozgzagwhyzjzgqgkuoi.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_QMVhTE4NWtTnl-uqef9skA_E8_euqp0';
  // ─────────────────────────────────────────────

  const VOTES_KEY = 'car_poll_my_votes';

  async function sbFetch(path, opts = {}) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      headers: {
        'apikey': SUPABASE_URL === 'YOUR_SUPABASE_URL' ? '' : SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': opts.prefer !== undefined ? opts.prefer : 'return=representation',
        ...(opts.headers || {})
      },
      ...opts
    });
    if (!res.ok) throw new Error(await res.text());
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  }

  const db = {
    getCars:  () => sbFetch('cars?order=votes.desc,created_at.asc&select=*'),
    addCar:   (name, added_by, weblink) => sbFetch('cars', {
      method: 'POST',
      body: JSON.stringify({ name, added_by, votes: 0, weblink: weblink || null }),
    }),
    updateCar: (id, name, weblink) => sbFetch(`cars?id=eq.${id}`, {
      method: 'PATCH',
      body: JSON.stringify({ name, weblink: weblink || null }),
    }),
    rpc: (fn, params) => sbFetch(`rpc/${fn}`, {
      method: 'POST',
      body: JSON.stringify(params),
      prefer: ''
    })
  };

  function getMyVotes() {
    try { return new Set(JSON.parse(localStorage.getItem(VOTES_KEY) || '[]')); }
    catch { return new Set(); }
  }
  function saveMyVotes(set) { localStorage.setItem(VOTES_KEY, JSON.stringify([...set])); }

  let cars = [];
  let myVotes = getMyVotes();
  let editingId = null;

  async function init() {
    if (SUPABASE_URL === 'YOUR_SUPABASE_URL') {
      document.getElementById('setupBanner').style.display = '';
      document.getElementById('emptyState').textContent = 'Configure Supabase to get started.';
      return;
    }
    await loadCars();
    setInterval(loadCars, 8000);
  }

  async function loadCars() {
    try { cars = await db.getCars(); render(); }
    catch(e) { console.error('Load error:', e); }
  }

  async function addCar() {
    const carEl  = document.getElementById('carInput');
    const nameEl = document.getElementById('nameInput');
    const linkEl = document.getElementById('linkInput');
    const name     = carEl.value.trim();
    const added_by = nameEl.value.trim() || 'Anonymous';
    const weblink  = linkEl.value.trim();
    if (!name) { carEl.focus(); return; }

    const btn = document.getElementById('addBtn');
    btn.disabled = true; btn.textContent = '...';

    try {
      await db.addCar(name, added_by, weblink);
      carEl.value = ''; linkEl.value = '';
      showToast(`"${name}" added!`);
      carEl.focus();
      await loadCars();
    } catch(e) {
      showToast('Error adding car — try again');
      console.error(e);
    } finally {
      btn.disabled = false; btn.textContent = 'Add';
    }
  }

  async function vote(id) {
    const car = cars.find(c => c.id === id);
    if (!car) return;
    const voted = myVotes.has(id);
    car.votes = Math.max(0, car.votes + (voted ? -1 : 1));
    if (voted) { myVotes.delete(id); } else { myVotes.add(id); }
    saveMyVotes(myVotes);
    render();
    try {
      await db.rpc(voted ? 'decrement_votes' : 'increment_votes', { row_id: id });
    } catch(e) {
      car.votes = Math.max(0, car.votes + (voted ? 1 : -1));
      if (voted) { myVotes.add(id); } else { myVotes.delete(id); }
      saveMyVotes(myVotes);
      render();
      showToast('Vote failed — try again');
    }
  }

  // ── Edit modal ──
  function openEdit(id) {
    const car = cars.find(c => c.id === id);
    if (!car) return;
    editingId = id;
    document.getElementById('editName').value = car.name || '';
    document.getElementById('editLink').value = car.weblink || '';
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('editName').focus(), 50);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    editingId = null;
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  async function saveEdit() {
    if (!editingId) return;
    const name    = document.getElementById('editName').value.trim();
    const weblink = document.getElementById('editLink').value.trim();
    if (!name) { document.getElementById('editName').focus(); return; }

    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = 'Saving...';

    try {
      await db.updateCar(editingId, name, weblink);
      closeModal();
      showToast('Updated!');
      await loadCars();
    } catch(e) {
      showToast('Save failed — try again');
      console.error(e);
    } finally {
      btn.disabled = false; btn.textContent = 'Save';
    }
  }

  // ── Render ──
  function render() {
    const sorted    = [...cars].sort((a, b) => b.votes - a.votes || a.id - b.id);
    const maxVotes  = sorted.length ? sorted[0].votes : 0;
    const totalVotes = cars.reduce((s, c) => s + c.votes, 0);

    const statsRow   = document.getElementById('statsRow');
    const listLabel  = document.getElementById('listLabel');
    const emptyState = document.getElementById('emptyState');
    const list       = document.getElementById('carsList');

    if (cars.length === 0) {
      statsRow.style.display = 'none'; listLabel.style.display = 'none';
      emptyState.style.display = ''; list.innerHTML = ''; return;
    }

    emptyState.style.display = 'none';
    statsRow.style.display   = 'grid';
    listLabel.style.display  = '';

    document.getElementById('statCars').textContent  = cars.length;
    document.getElementById('statVotes').textContent = totalVotes;
    document.getElementById('statMine').textContent  = myVotes.size;

    const medals = ['🥇','🥈','🥉'];
    list.innerHTML = sorted.map((car, i) => {
      const voted = myVotes.has(car.id);
      const pct   = maxVotes > 0 ? (car.votes / maxVotes * 100).toFixed(1) : 0;
      const rank  = i < 3
        ? `<span class="rank top">${medals[i]}</span>`
        : `<span class="rank">${i + 1}</span>`;

      const linkHtml = car.weblink
        ? `<a class="car-link" href="${esc(car.weblink)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">&#x2197; ${esc(shortUrl(car.weblink))}</a>`
        : '';

      return `
        <div class="car-card${voted ? ' voted' : ''}">
          ${rank}
          <button class="vote-btn${voted ? ' active' : ''}" onclick="vote(${car.id})">
            <span class="count">${car.votes}</span>
            <span class="lbl">${voted ? 'voted' : 'vote'}</span>
          </button>
          <div class="car-info" onclick="openEdit(${car.id})">
            <div class="car-name">${esc(car.name)}</div>
            <div class="car-meta">
              <span>by ${esc(car.added_by)}</span>
              ${linkHtml}
              <span class="edit-hint">click to edit</span>
            </div>
            <div class="bar-wrap"><div class="bar" style="width:${pct}%"></div></div>
          </div>
        </div>`;
    }).join('');
  }

  function shortUrl(url) {
    try { return new URL(url).hostname.replace(/^www\./, ''); }
    catch { return url.slice(0, 30); }
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 2200);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter') {
      const active = document.activeElement;
      if (active.id === 'carInput' || active.id === 'nameInput' || active.id === 'linkInput') addCar();
      if (active.id === 'editName' || active.id === 'editLink') saveEdit();
    }
  });

  init();
</script>
</body>
</html>
